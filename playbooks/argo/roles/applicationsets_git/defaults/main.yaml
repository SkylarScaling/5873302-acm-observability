---
# ApplicationSet metadata
applicationset_name: gitops-generated-apps
applicationset_namespace: openshift-gitops

# AppProject for generated Applications (must allow gitops_repo_url in sourceRepos)
applicationset_project: acm

applicationset_repo_revision: main

# Git directory generator: each matching path under the repo becomes one Application.
# Each item is a directory rule (path supports globs, e.g. apps/*). See Argo ApplicationSet Git generator docs.
applicationset_git_directories:
  - path: acm
  - path: mco

# When true, use matrix(git × clusters): one Application per (Git path × Argo-registered cluster).
# When false, Git only; destination.server is applicationset_destination_server for every Application.
applicationset_cluster_generator_enabled: true

# Subset of clusters (Argo CD cluster secrets). Empty {} = all clusters Argo knows (in-cluster + registered).
# Example: { matchLabels: { environment: "prod" } } — see Argo Cluster generator docs.
applicationset_clusters_selector: {}

# Used only when applicationset_cluster_generator_enabled is false
applicationset_destination_server: https://kubernetes.default.svc

# basename — use Git path basename as target namespace (one namespace per discovered directory)
# fixed — use applicationset_destination_namespace for every Application
applicationset_destination_namespace_mode: basename
applicationset_destination_namespace: ""

# Directory source (per generated Application)
applicationset_directory_recurse: true

# Automatic | Manual (no automated block when Manual)
applicationset_sync_policy: Automatic

applicationset_sync_options:
  - CreateNamespace=true
  - SkipDryRunOnMissingResource=true
  - ServerSideApply=true

applicationset_sync_retry_limit: 5
applicationset_sync_retry_backoff_duration: 30s
applicationset_sync_retry_backoff_factor: 2
applicationset_sync_retry_backoff_max_duration: 3m
