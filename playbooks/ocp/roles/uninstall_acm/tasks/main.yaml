- name: "Disable self-management on MultiClusterHub"
  kubernetes.core.k8s:
    state: present
    definition: "{{ multiclusterhub_info.resources[0] | combine({'spec': (multiclusterhub_info.resources[0].spec | default({}) | combine({'disableSelfManagement': true}))}, recursive=true) }}"
  when: multiclusterhub_info.resources | length > 0

- name: "Delete MultiClusterHub custom resource"
  kubernetes.core.k8s:
    api_version: operator.open-cluster-management.io/v1
    kind: MultiClusterHub
    name: "{{ acm_multiclusterhub_name }}"
    namespace: "{{ acm_multiclusterhub_namespace }}"
    state: absent
    delete_all: true
  when: multiclusterhub_info.resources | length > 0

