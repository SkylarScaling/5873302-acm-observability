---
# Remove ArgoCD Application for MCO first so GitOps does not recreate observability
- name: "Check if ArgoCD Application for MCO exists"
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "{{ mco_argocd_app_name }}"
    namespace: "{{ mco_argocd_namespace }}"
  register: mco_argocd_app_info
  ignore_errors: true
  when: remove_argocd_application | bool

- name: "Delete ArgoCD Application for MCO"
  kubernetes.core.k8s:
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "{{ mco_argocd_app_name }}"
    namespace: "{{ mco_argocd_namespace }}"
    state: absent
  when:
    - remove_argocd_application | bool
    - mco_argocd_app_info.resources | length > 0

# Check if MultiClusterObservability CR exists
- name: "Check if MultiClusterObservability custom resource exists"
  kubernetes.core.k8s_info:
    api_version: observability.open-cluster-management.io/v1beta2
    kind: MultiClusterObservability
    name: "{{ mco_cr_name }}"
    namespace: "{{ mco_cr_namespace }}"
  register: mco_cr_info
  ignore_errors: true

- name: "Delete MultiClusterObservability custom resource"
  kubernetes.core.k8s:
    api_version: observability.open-cluster-management.io/v1beta2
    kind: MultiClusterObservability
    name: "{{ mco_cr_name }}"
    namespace: "{{ mco_cr_namespace }}"
    state: absent
  when: mco_cr_info.resources | length > 0

- name: "Wait for MultiClusterObservability to be fully deleted"
  kubernetes.core.k8s_info:
    api_version: observability.open-cluster-management.io/v1beta2
    kind: MultiClusterObservability
    name: "{{ mco_cr_name }}"
    namespace: "{{ mco_cr_namespace }}"
  register: mco_cr_deleted
  until: mco_cr_deleted.resources | length == 0
  retries: "{{ mco_deletion_retries }}"
  delay: "{{ mco_deletion_delay }}"
  failed_when: false
  when:
    - wait_for_mco_deletion | bool
    - mco_cr_info.resources | length > 0

# Optionally delete the observability namespace (removes Thanos, Grafana, Alertmanager, etc.)
- name: "Check if observability namespace exists"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "open-cluster-management-observability"
  register: mco_namespace_info
  ignore_errors: true
  when: delete_observability_namespace | bool

- name: "Delete observability namespace"
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "open-cluster-management-observability"
    state: absent
  when:
    - delete_observability_namespace | bool
    - mco_namespace_info.resources | length > 0

- name: "Wait for observability namespace deletion to complete"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "open-cluster-management-observability"
  register: mco_namespace_deleted
  until: mco_namespace_deleted.resources | length == 0
  retries: 30
  delay: 5
  failed_when: false
  when:
    - delete_observability_namespace | bool
    - mco_namespace_info.resources | length > 0

- name: "Multicluster observability uninstall complete"
  ansible.builtin.debug:
    msg: "Multicluster observability feature has been uninstalled from ACM."
