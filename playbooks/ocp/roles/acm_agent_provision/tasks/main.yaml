---
# --- PHASE 1: VM CREATION & MAC GATHERING ---

- name: "Create Master VMs (Powered Off to assign MACs)"
  community.vmware.vmware_guest:
    hostname: "{{ vcenter.hostname }}"
    username: "{{ vcenter.username }}"
    password: "{{ vcenter.password }}"
    validate_certs: false
    datacenter: "{{ vcenter.datacenter }}"
    cluster: "{{ vcenter.cluster }}"
    folder: "{{ vcenter.folder }}"
    name: "{{ item.name }}"
    guest_id: "coreos64Guest"
    state: present
    hardware:
      memory_mb: 32768
      num_cpus: 8
    disk:
      - size_gb: 120
        type: thin
        datastore: "{{ vcenter.datastore }}"
        controller_type: paravirtual
        controller_number: 0
        unit_number: 0
    networks:
      - name: "{{ vcenter.network }}"
        device_type: vmxnet3
  loop: "{{ ocp_nodes.masters }}"
  register: master_vms_created

- name: "Create Worker VMs (Powered Off to assign MACs)"
  community.vmware.vmware_guest:
    hostname: "{{ vcenter.hostname }}"
    username: "{{ vcenter.username }}"
    password: "{{ vcenter.password }}"
    validate_certs: false
    datacenter: "{{ vcenter.datacenter }}"
    cluster: "{{ vcenter.cluster }}"
    folder: "{{ vcenter.folder }}"
    name: "{{ item.name }}"
    guest_id: "coreos64Guest"
    state: present
    hardware:
      memory_mb: 32768
      num_cpus: 8
    disk:
      - size_gb: 120
        type: thin
        datastore: "{{ vcenter.datastore }}"
        controller_type: paravirtual
        controller_number: 0
        unit_number: 0
    networks:
      - name: "{{ vcenter.network }}"
        device_type: vmxnet3
  loop: "{{ ocp_nodes.workers }}"
  register: worker_vms_created

# --- PHASE 2: STATIC IP CONFIGURATION ---

- name: "Apply NMStateConfigs for Master Nodes"
  kubernetes.core.k8s:
    state: present
    template: nmstate-config.yaml.j2
  loop: "{{ master_vms_created.results }}"
  vars:
    node_name: "{{ item.item.name }}"
    node_ip: "{{ item.item.ip }}"
    node_mac: "{{ item.instance.hw_eth0.macaddress | lower }}"

- name: "Apply NMStateConfigs for Worker Nodes"
  kubernetes.core.k8s:
    state: present
    template: nmstate-config.yaml.j2
  loop: "{{ worker_vms_created.results }}"
  vars:
    node_name: "{{ item.item.name }}"
    node_ip: "{{ item.item.ip }}"
    node_mac: "{{ item.instance.hw_eth0.macaddress | lower }}"

# --- PHASE 3: MANIFESTS & ISO GENERATION ---

- name: "Apply Core Cluster Manifests to ACM Hub"
  kubernetes.core.k8s:
    state: present
    template: cluster-manifests.yaml.j2

- name: "Wait for InfraEnv to generate the Discovery ISO URL"
  kubernetes.core.k8s_info:
    api_version: agent-install.openshift.io/v1beta1
    kind: InfraEnv
    name: "{{ ocp_cluster.name }}"
    namespace: "{{ ocp_cluster.name }}"
  register: infraenv_info
  until:
    - infraenv_info.resources | length > 0
    - infraenv_info.resources[0].status is defined
    - infraenv_info.resources[0].status.isoDownloadURL is defined
  retries: 30
  delay: 10

# TODO: Commenting this out for demo.redhat, because it is giving an "object is not subscriptable" error.
# TODO: Manually uploading iso from last task and re-running...
- name: "Download Discovery ISO from ACM to Bastion tmp_dir"
  ansible.builtin.get_url:
    url: "{{ infraenv_info.resources[0].status.isoDownloadURL }}"
    dest: "{{ tmp_dir }}/{{ ocp_cluster.name }}-discovery.iso"
    validate_certs: false
    timeout: 300

