---
- name: "Create {{ node_type | capitalize }} VMs in VMware"
  community.vmware.vmware_guest:
    hostname: "{{ vcenter.hostname }}"
    username: "{{ vcenter.username }}"
    password: "{{ vcenter.password }}"
    validate_certs: false
    datacenter: "{{ vcenter.datacenter }}"
    cluster: "{{ vcenter.cluster }}"
    folder: "{{ vcenter.folder }}"

    # Custom Naming Logic: Uses explicitly defined name, falls back to default prefix + type + index
    name: "{{ item.name | default(vm_name_prefix + '-' + node_type + '-' + node_idx|string) }}"

    template: "{{ vcenter.rhcos_template }}"
    state: poweredon
    hardware:
      memory_mb: "{{ vm_specs[node_type].memory_mb }}"
      num_cpus: "{{ vm_specs[node_type].cpu }}"
    disk:
      - size_gb: "{{ vm_specs[node_type].disk_gb }}"
        type: thin
        datastore: "{{ vcenter.datastore }}"
    networks:
      - name: "{{ vcenter.network }}"
        mac: "00:50:56:00:{{ '%02x' % (item.ip.split('.')[2] | int) }}:{{ '%02x' % (item.ip.split('.')[3] | int) }}"
    networks:
      - name: "{{ vcenter.network }}"
    advanced_settings:
      - key: guestinfo.ignition.config.data
        value: "{{ (ignition_data.results | selectattr('item', 'equalto', node_type) | first).content }}"
      - key: guestinfo.ignition.config.data.encoding
        value: base64
      - key: disk.EnableUUID
        value: "TRUE"
      - key: guestinfo.afterburn.initrd.network-kargs
        value: "ip={{ item.ip }}::{{ ocp_nodes.network.gateway }}:{{ ocp_nodes.network.netmask }}:{{ item.name }}:eth0:none nameserver={{ ocp_nodes.network.dns }}"
  loop: "{{ node_list }}"
  loop_control:
    index_var: node_idx