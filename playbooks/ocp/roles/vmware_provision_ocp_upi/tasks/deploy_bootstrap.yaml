---
- name: Deploy Bootstrap VM
  community.vmware.vmware_guest:
    hostname: "{{ vcenter.hostname }}"
    username: "{{ vcenter.username }}"
    password: "{{ vcenter.password }}"
    validate_certs: false
    datacenter: "{{ vcenter.datacenter }}"
    cluster: "{{ vcenter.cluster }}"
    folder: "{{ vcenter.folder }}"

    # Target custom name from inventory, fallback to default prefix
    name: "{{ ocp_nodes.bootstrap.name | default(vm_name_prefix + '-bootstrap') }}"

    template: "{{ vcenter.rhcos_template }}"
    state: poweredon
    hardware:
      memory_mb: "{{ vm_specs.bootstrap.memory_mb }}"
      num_cpus: "{{ vm_specs.bootstrap.cpu }}"
    disk:
      - size_gb: "{{ vm_specs.bootstrap.disk_gb }}"
        type: thin
        datastore: "{{ vcenter.datastore }}"
    networks:
      - name: "{{ vcenter.network }}"
        mac: "{{ ocp_nodes.bootstrap.mac | default(omit) }}"
    advanced_settings:
      - key: guestinfo.ignition.config.data
        value: "{{ lookup('file', tmp_dir + '/install/' + ocp_cluster.name + '/append-bootstrap.ign') | b64encode }}"
      - key: guestinfo.ignition.config.data.encoding
        value: base64
      - key: disk.EnableUUID
        value: "TRUE"
      - key: guestinfo.afterburn.initrd.network-kargs
        value: "ip={{ ocp_nodes.bootstrap.ip }}::{{ ocp_nodes.network.gateway }}:{{ ocp_nodes.network.netmask }}:{{ ocp_nodes.bootstrap.name }}:ens192:none nameserver={{ ocp_nodes.network.dns }}"