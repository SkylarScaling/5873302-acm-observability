---
- name: Wait for Bootstrap VM to report IP address
  community.vmware.vmware_guest_info:
    hostname: "{{ vcenter.hostname }}"
    username: "{{ vcenter.username }}"
    password: "{{ vcenter.password }}"
    validate_certs: false
    datacenter: "{{ vcenter.datacenter }}"
    name: "{{ ocp_nodes.bootstrap.name | default(vm_name_prefix + '-bootstrap') }}"
  register: bootstrap_info
  # The 'true' flag forces default to replace NoneTypes with an empty string
  until: bootstrap_info.instance.ipv4 | default('', true) | length > 0
  retries: 60
  delay: 10

- name: Wait for Master VMs to report IP addresses
  community.vmware.vmware_guest_info:
    hostname: "{{ vcenter.hostname }}"
    username: "{{ vcenter.username }}"
    password: "{{ vcenter.password }}"
    validate_certs: false
    datacenter: "{{ vcenter.datacenter }}"
    name: "{{ item.name | default(vm_name_prefix + '-master-' + node_idx|string) }}"
  loop: "{{ ocp_nodes.masters }}"
  loop_control:
    index_var: node_idx
  register: masters_info
  until: masters_info.instance.ipv4 | default('', true) | length > 0
  retries: 60
  delay: 10

- name: Wait for Worker VMs to report IP addresses
  community.vmware.vmware_guest_info:
    hostname: "{{ vcenter.hostname }}"
    username: "{{ vcenter.username }}"
    password: "{{ vcenter.password }}"
    validate_certs: false
    datacenter: "{{ vcenter.datacenter }}"
    name: "{{ item.name | default(vm_name_prefix + '-worker-' + node_idx|string) }}"
  loop: "{{ ocp_nodes.workers }}"
  loop_control:
    index_var: node_idx
  register: workers_info
  until: workers_info.instance.ipv4 | default('', true) | length > 0
  retries: 60
  delay: 10

- name: Extract IP lists into facts
  ansible.builtin.set_fact:
    bootstrap_ip: "{{ bootstrap_info.instance.ipv4 }}"
    master_ips: "{{ masters_info.results | map(attribute='instance.ipv4') | list }}"
    worker_ips: "{{ workers_info.results | map(attribute='instance.ipv4') | list }}"

- name: Display fetched IPs
  ansible.builtin.debug:
    msg:
      - "Bootstrap: {{ bootstrap_ip }}"
      - "Masters: {{ master_ips }}"
      - "Workers: {{ worker_ips }}"

- name: Install HAProxy on Bastion
  ansible.builtin.package:
    name: haproxy
    state: present
  become: true
  delegate_to: "{{ groups['bastion'][0] }}"

- name: Ensure Apache (httpd) is stopped to free up ports 80/443
  ansible.builtin.systemd:
    name: httpd
    state: stopped
    enabled: false
  become: true
  delegate_to: "{{ groups['bastion'][0] }}"
  ignore_errors: true

- name: Configure SELinux to allow HAProxy on OCP ports
  ansible.builtin.shell: |
    setsebool -P haproxy_connect_any 1
    semanage port -a -t http_port_t -p tcp 6443 || true
    semanage port -a -t http_port_t -p tcp 22623 || true
  become: true
  delegate_to: "{{ groups['bastion'][0] }}"

- name: Template HAProxy Configuration on Bastion
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: '0644'
  become: true
  delegate_to: "{{ groups['bastion'][0] }}"

- name: Open required OpenShift ports in Bastion firewall
  ansible.builtin.shell: |
    firewall-cmd --add-port=6443/tcp --permanent || true
    firewall-cmd --add-port=22623/tcp --permanent || true
    firewall-cmd --add-port=80/tcp --permanent || true
    firewall-cmd --add-port=443/tcp --permanent || true
    firewall-cmd --reload || true
  become: true
  delegate_to: "{{ groups['bastion'][0] }}"

- name: Restart HAProxy service
  ansible.builtin.systemd:
    name: haproxy
    state: restarted
    enabled: true
  become: true
  delegate_to: "{{ groups['bastion'][0] }}"